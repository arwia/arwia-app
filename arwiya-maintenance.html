<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أروية — إدارة الصيانة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --bg4: #252d3f;
  --border: #2e3a52; --text: #e8edf5; --text2: #8a96a8; --text3: #5a6478;
  --accent: #3d7fff; --accent2: #2563d4;
  --green: #22c55e; --green-bg: #0f2d1c;
  --amber: #f59e0b; --amber-bg: #2a1f06;
  --red: #ef4444; --red-bg: #2a0f0f;
  --purple: #a78bfa; --purple-bg: #1e1535;
  --teal: #14b8a6; --teal-bg: #0a2420;
  --radius: 10px; --radius-sm: 6px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* LOGIN SCREEN */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
.login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; width: 360px; box-shadow: var(--shadow); }
.login-logo { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
.login-roles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.role-btn { padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: all 0.15s; text-align: center; }
.role-btn:hover { border-color: var(--accent); color: var(--text); }
.role-btn.selected { border-color: var(--accent); background: #0f1f3d; color: var(--accent); }
.role-icon { font-size: 20px; margin-bottom: 4px; display: block; }
.login-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color 0.15s; }
.login-input:focus { border-color: var(--accent); }
.login-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.login-btn:hover { background: var(--accent2); }
.login-error { color: var(--red); font-size: 12px; margin-top: -8px; margin-bottom: 12px; display: none; }

/* APP */
#app { display: none; flex; height: 100vh; overflow: hidden; }
#app.visible { display: flex; }
#sidebar { width: 220px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

.sidebar-logo { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo .logo-name { font-size: 15px; font-weight: 600; }
.sidebar-logo .logo-role { font-size: 11px; margin-top: 3px; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 600; }
.role-admin .logo-role { background: #0f1f3d; color: var(--accent); }
.role-workshop .logo-role { background: var(--amber-bg); color: var(--amber); }
.role-purchase .logo-role { background: var(--green-bg); color: var(--green); }

.sidebar-logout { margin: auto 8px 12px; padding: 8px 14px; border-radius: var(--radius-sm); color: var(--text3); cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
.sidebar-logout:hover { background: var(--red-bg); color: var(--red); }

.nav-section { padding: 12px 10px 4px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: var(--radius-sm); cursor: pointer; margin: 1px 6px; color: var(--text2); transition: all 0.15s; font-size: 13px; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent2); color: #fff; }
.nav-item .nav-icon { width: 16px; text-align: center; font-size: 15px; }
.nav-badge { margin-right: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }

#topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#topbar h1 { font-size: 17px; font-weight: 600; flex: 1; }
#content { padding: 24px; flex: 1; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-success { background: var(--green); color: #fff; }
.btn-amber { background: var(--amber); color: #000; }
.btn-danger { background: var(--red); color: #fff; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; }
.stat-value { font-size: 26px; font-weight: 600; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat-card.amber { border-color: var(--amber); }
.stat-card.red { border-color: var(--red); }
.stat-card.accent { border-color: var(--accent); }
.stat-card.green { border-color: var(--green); }

.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.table-title { font-size: 14px; font-weight: 600; flex: 1; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th { padding: 10px 18px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text3); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
td { padding: 11px 18px; font-size: 13px; }
.td-muted { color: var(--text2); }

.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-blue { background: #0f1f3d; color: var(--accent); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-gray { background: var(--bg3); color: var(--text2); }

.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1/-1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.form-control { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.15s; width: 100%; }
.form-control:focus { border-color: var(--accent); }
select.form-control option { background: var(--bg3); }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

.tabs { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; width: fit-content; }
.tab { padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); font-weight: 500; transition: all 0.15s; }
.tab.active { background: var(--accent); color: #fff; }
.tab:hover:not(.active) { color: var(--text); background: var(--bg3); }

.alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.alert-amber { background: var(--amber-bg); border: 1px solid #4a3008; color: var(--amber); }
.alert-red { background: var(--red-bg); border: 1px solid #4a1010; color: var(--red); }
.alert-green { background: var(--green-bg); border: 1px solid #0a3d1c; color: var(--green); }

.asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.asset-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.15s; }
.asset-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.asset-card.status-maintenance { border-right: 3px solid var(--amber); }
.asset-card.status-active { border-right: 3px solid var(--green); }
.asset-card.status-retired { border-right: 3px solid var(--text3); opacity: 0.6; }
.asset-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.asset-code { font-size: 18px; font-weight: 700; }
.asset-name { font-size: 12px; color: var(--text2); margin-top: 2px; }
.asset-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.asset-meta-item .label { font-size: 10px; color: var(--text3); }
.asset-meta-item .value { font-size: 13px; font-weight: 500; }

.progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

.empty-state { text-align: center; padding: 60px 24px; color: var(--text3); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }

.dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.order-mini { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.order-mini:last-child { border-bottom: none; }
.order-mini-num { font-size: 11px; color: var(--text3); min-width: 32px; }
.order-mini-title { font-size: 13px; flex: 1; }
.order-mini-asset { font-size: 11px; color: var(--text2); }

.loading { text-align: center; padding: 40px; color: var(--text3); }

/* Parts receipt modal */
.parts-list { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.part-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg3); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.part-item-name { flex: 1; font-size: 13px; }
.part-item-qty { font-size: 13px; font-weight: 600; color: var(--amber); min-width: 60px; text-align: center; }
.part-item-status { font-size: 11px; }
.part-receive-btn { padding: 4px 10px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.part-receive-btn.pending { background: var(--amber-bg); color: var(--amber); }
.part-receive-btn.received { background: var(--green-bg); color: var(--green); cursor: default; }

#toast { position: fixed; bottom: 24px; left: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 18px; font-size: 13px; box-shadow: var(--shadow); z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 320px; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: var(--green); color: var(--green); }
#toast.error { border-color: var(--red); color: var(--red); }

@media (max-width: 768px) {
  #sidebar { width: 52px; }
  .sidebar-logo .logo-name, .sidebar-logo .logo-role, .nav-section, .nav-item span, .sidebar-logout span { display: none; }
  .nav-item { justify-content: center; padding: 12px; }
  .dash-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔧 أروية</div>
    <div class="login-sub">إدارة الصيانة — اختر دورك</div>
    <div class="login-roles">
      <div class="role-btn" onclick="selectRole('admin')" id="role-admin">
        <span class="role-icon">👔</span>الإدارة
      </div>
      <div class="role-btn" onclick="selectRole('workshop')" id="role-workshop">
        <span class="role-icon">🔧</span>الورشة
      </div>
      <div class="role-btn" onclick="selectRole('purchase')" id="role-purchase">
        <span class="role-icon">🛒</span>المشتريات
      </div>
    </div>
    <div class="form-group">
      <label class="login-label">كلمة المرور</label>
      <input class="login-input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="login-error">كلمة المرور غير صحيحة</div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-name">🔧 أروية</div>
      <div class="logo-role" id="role-label">—</div>
    </div>
    <div id="nav-menu"></div>
    <div class="sidebar-logout" onclick="doLogout()">
      <span>🚪</span><span>خروج</span>
    </div>
  </nav>
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">لوحة التحكم</h1>
      <div id="topbar-actions"></div>
    </div>
    <div id="content">
      <div class="loading">⏳ جاري التحميل...</div>
    </div>
  </div>
</div>

<!-- MODALS -->
<!-- Asset modal (admin only) -->
<div class="modal-backdrop" id="modal-asset">
  <div class="modal">
    <div class="modal-title" id="modal-asset-title">إضافة أصل جديد</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">النوع *</label>
        <select class="form-control" id="a-type"><option value="truck">شاحنة / سيارة</option><option value="container">حاوية</option></select></div>
      <div class="form-group"><label class="form-label">الرقم / اللوحة *</label>
        <input class="form-control" id="a-code" placeholder="مثال: 4952"></div>
      <div class="form-group form-full"><label class="form-label">الوصف</label>
        <input class="form-control" id="a-name" placeholder="مثال: شاحنة رافعة كبيرة"></div>
      <div class="form-group"><label class="form-label">الماركة</label>
        <input class="form-control" id="a-brand"></div>
      <div class="form-group"><label class="form-label">الموديل</label>
        <input class="form-control" id="a-model"></div>
      <div class="form-group"><label class="form-label">سنة الصنع</label>
        <input class="form-control" id="a-year" type="number" placeholder="2020"></div>
      <div class="form-group"><label class="form-label">الحالة</label>
        <select class="form-control" id="a-status"><option value="active">نشط</option><option value="maintenance">في الصيانة</option><option value="retired">متقاعد</option></select></div>
      <div class="form-group"><label class="form-label">عداد الكيلومترات</label>
        <input class="form-control" id="a-odo" type="number" placeholder="0"></div>
      <div class="form-group form-full"><label class="form-label">ملاحظات</label>
        <textarea class="form-control" id="a-notes" rows="2"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-asset')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveAsset()">حفظ</button>
    </div>
  </div>
</div>

<!-- Order modal -->
<div class="modal-backdrop" id="modal-order">
  <div class="modal">
    <div class="modal-title" id="modal-order-title">أمر عمل جديد</div>
    <div class="form-grid">
      <div class="form-group form-full"><label class="form-label">الأصل *</label>
        <select class="form-control" id="o-asset"></select></div>
      <div class="form-group form-full"><label class="form-label">العنوان / وصف العطل *</label>
        <input class="form-control" id="o-title" placeholder="مثال: تسريب زيت محرك"></div>
      <div class="form-group"><label class="form-label">النوع</label>
        <select class="form-control" id="o-type"><option value="corrective">تصحيحية</option><option value="preventive">وقائية</option></select></div>
      <div class="form-group"><label class="form-label">الأولوية</label>
        <select class="form-control" id="o-priority"><option value="low">منخفضة</option><option value="medium">متوسطة</option><option value="high">عالية</option><option value="critical">حرجة</option></select></div>
      <div class="form-group"><label class="form-label">الفني المسؤول</label>
        <input class="form-control" id="o-assigned" placeholder="اسم الفني"></div>
      <div class="form-group"><label class="form-label">مقدم البلاغ</label>
        <input class="form-control" id="o-reporter"></div>
      <div class="form-group admin-only"><label class="form-label">التكلفة التقديرية (ر.س)</label>
        <input class="form-control" id="o-est-cost" type="number" placeholder="0"></div>
      <div class="form-group"><label class="form-label">عداد الكيلومترات</label>
        <input class="form-control" id="o-odo" type="number" placeholder="0"></div>
      <div class="form-group form-full"><label class="form-label">تفاصيل إضافية</label>
        <textarea class="form-control" id="o-desc" rows="2"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-order')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveOrder()">حفظ</button>
    </div>
  </div>
</div>

<!-- Part modal (admin only) -->
<div class="modal-backdrop" id="modal-part">
  <div class="modal">
    <div class="modal-title">إضافة قطعة غيار</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">رقم القطعة</label>
        <input class="form-control" id="p-num"></div>
      <div class="form-group"><label class="form-label">اسم القطعة *</label>
        <input class="form-control" id="p-name" placeholder="مثال: فلتر زيت"></div>
      <div class="form-group"><label class="form-label">الفئة</label>
        <input class="form-control" id="p-cat"></div>
      <div class="form-group"><label class="form-label">وحدة القياس</label>
        <select class="form-control" id="p-unit"><option value="piece">قطعة</option><option value="liter">لتر</option><option value="kg">كيلو</option><option value="set">طقم</option></select></div>
      <div class="form-group"><label class="form-label">الكمية الحالية</label>
        <input class="form-control" id="p-qty" type="number" value="0"></div>
      <div class="form-group"><label class="form-label">الحد الأدنى للتنبيه</label>
        <input class="form-control" id="p-min" type="number" value="1"></div>
      <div class="form-group"><label class="form-label">سعر الوحدة (ر.س)</label>
        <input class="form-control" id="p-cost" type="number" value="0"></div>
      <div class="form-group"><label class="form-label">المورد</label>
        <input class="form-control" id="p-supplier"></div>
      <div class="form-group"><label class="form-label">موقع في المستودع</label>
        <input class="form-control" id="p-loc" placeholder="مثال: رف A-3"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-part')">إلغاء</button>
      <button class="btn btn-primary" onclick="savePart()">حفظ</button>
    </div>
  </div>
</div>

<!-- Purchase request modal (workshop) -->
<div class="modal-backdrop" id="modal-purchase-req">
  <div class="modal">
    <div class="modal-title">طلب قطعة غيار</div>
    <div class="form-grid">
      <div class="form-group form-full"><label class="form-label">الصنف المطلوب *</label>
        <input class="form-control" id="pr-item" placeholder="اسم القطعة أو المادة"></div>
      <div class="form-group"><label class="form-label">الكمية *</label>
        <input class="form-control" id="pr-qty" type="number" value="1"></div>
      <div class="form-group"><label class="form-label">السعر التقديري للوحدة</label>
        <input class="form-control" id="pr-cost" type="number" value="0"></div>
      <div class="form-group"><label class="form-label">المورد المقترح</label>
        <input class="form-control" id="pr-supplier"></div>
      <div class="form-group form-full"><label class="form-label">مرتبط بأمر عمل</label>

// ======================== API ========================
async function api(table, method='GET', body=null, query='') {
  const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
  const opts = { method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

function showToast(msg, type='success') {

    let html = '';
    if (low.length) html += `<div class="alert alert-amber">📦 ${low.length} قطعة وصلت للحد الأدنى</div>`;
    html += `<div class="table-wrap"><table>
      <thead><tr><th>الاسم</th><th>الفئة</th><th>الكمية</th><th>الحد الأدنى</th>${currentRole==='admin'?'<th>سعر الوحدة</th><th>المورد</th>':''}<th>الموقع</th>${currentRole==='admin'?'<th>إجراء</th>':''}</tr></thead><tbody>`;
    if (!parts.length) html += `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">لا توجد قطع مسجلة</td></tr>`;
    else parts.forEach(p => {
      const zero=p.qty_on_hand===0; const lo=p.qty_on_hand<=p.qty_minimum;
      html += `<tr>
        <td><b>${p.name}</b></td>
        <td class="td-muted">${p.category||'—'}</td>
        <td><span style="color:${zero?'var(--red)':lo?'var(--amber)':'var(--green)'};font-weight:600">${p.qty_on_hand}</span> ${p.unit}</td>
        <td class="td-muted">${p.qty_minimum}</td>
        ${currentRole==='admin'?`<td class="td-muted">${p.unit_cost?p.unit_cost.toLocaleString()+' ر.س':'—'}</td><td class="td-muted">${p.supplier||'—'}</td>`:''}
        <td class="td-muted">${p.location||'—'}</td>
        ${currentRole==='admin'?`<td><button class="btn btn-ghost btn-sm" onclick="editPart('${p.id}')">تعديل</button></td>`:''}
      </tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('content').innerHTML = html;
  } catch(e) { document.getElementById('content').innerHTML = `<div class="alert alert-red">❌ ${e.message}</div>`; }
}

function openPartModal() { editingId=null; ['num','name','cat','loc','supplier'].forEach(f=>document.getElementById(`p-${f}`).value=''); document.getElementById('p-qty').value=0; document.getElementById('p-min').value=1; document.getElementById('p-cost').value=0; document.getElementById('p-unit').value='piece'; openModal('modal-part'); }
async function editPart(id) { const r=await api('maint_parts','GET',null,`?id=eq.${id}`); if(!r?.length) return; const p=r[0]; editingId=id; document.getElementById('p-num').value=p.part_number||''; document.getElementById('p-name').value=p.name||''; document.getElementById('p-cat').value=p.category||''; document.getElementById('p-unit').value=p.unit||'piece'; document.getElementById('p-qty').value=p.qty_on_hand||0; document.getElementById('p-min').value=p.qty_minimum||0; document.getElementById('p-cost').value=p.unit_cost||0; document.getElementById('p-supplier').value=p.supplier||''; document.getElementById('p-loc').value=p.location||''; openModal('modal-part'); }
async function savePart() {
  const body = { part_number:document.getElementById('p-num').value.trim(), name:document.getElementById('p-name').value.trim(), category:document.getElementById('p-cat').value.trim(), unit:document.getElementById('p-unit').value, qty_on_hand:parseFloat(document.getElementById('p-qty').value)||0, qty_minimum:parseFloat(document.getElementById('p-min').value)||0, unit_cost:parseFloat(document.getElementById('p-cost').value)||0, supplier:document.getElementById('p-supplier').value.trim(), location:document.getElementById('p-loc').value.trim() };
  if (!body.name) return showToast('يرجى إدخال اسم القطعة','error');
  try { if(editingId) await api('maint_parts','PATCH',body,`?id=eq.${editingId}`); else await api('maint_parts','POST',body); closeModal('modal-part'); showToast('تم الحفظ ✓'); renderParts(); } catch(e) { showToast(e.message,'error'); }
}

// ======================== PURCHASES (admin + purchase role) ========================
let purchaseFilter = 'pending';
async function renderPurchases() {
  try {
    const all = await api('maint_purchase_requests','GET',null,'?select=*,maint_orders(order_number,title)&order=created_at.desc');
    // Purchase role sees all, admin sees all
    const counts = { pending:all.filter(p=>p.status==='pending').length, approved:all.filter(p=>['approved','ordered'].includes(p.status)).length, done:all.filter(p=>p.status==='received').length, all:all.length };
    let filtered = purchaseFilter==='all'?all:all.filter(p=>purchaseFilter==='pending'?p.status==='pending':purchaseFilter==='approved'?['approved','ordered'].includes(p.status):p.status==='received');

    let html = `<div class="tabs">
      <div class="tab ${purchaseFilter==='pending'?'active':''}" onclick="purchaseFilter='pending';renderPurchases()">قيد المراجعة (${counts.pending})</div>
      <div class="tab ${purchaseFilter==='approved'?'active':''}" onclick="purchaseFilter='approved';renderPurchases()">معتمدة (${counts.approved})</div>
      <div class="tab ${purchaseFilter==='done'?'active':''}" onclick="purchaseFilter='done';renderPurchases()">مستلمة (${counts.done})</div>
      <div class="tab ${purchaseFilter==='all'?'active':''}" onclick="purchaseFilter='all';renderPurchases()">الكل (${counts.all})</div>
    </div><div class="table-wrap"><table>
      <thead><tr><th>رقم</th><th>الصنف</th><th>الكمية</th><th>التكلفة</th><th>المورد</th><th>مرتبط بأمر</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>`;
    if (!filtered.length) html += `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">لا توجد طلبات</td></tr>`;
    else filtered.forEach(p => {
      const total=(p.qty_requested||0)*(p.unit_cost_estimated||0);
      html += `<tr>
        <td><b>#${p.request_number}</b></td>
        <td>${p.item_name}</td>
        <td>${p.qty_requested}</td>
        <td class="td-muted">${total?total.toLocaleString()+' ر.س':'—'}</td>
        <td class="td-muted">${p.supplier||'—'}</td>
        <td class="td-muted">${p.maint_orders?'#'+p.maint_orders.order_number:'—'}</td>
        <td><span class="badge ${purchaseStatusBadge[p.status]}">${purchaseStatusLabel[p.status]}</span></td>
        <td style="display:flex;gap:4px;flex-wrap:wrap">
          ${p.status==='pending'?`<button class="btn btn-success btn-sm" onclick="updatePurchase('${p.id}','approved')">اعتماد</button><button class="btn btn-danger btn-sm" onclick="updatePurchase('${p.id}','cancelled')">رفض</button>`:''}
          ${p.status==='approved'?`<button class="btn btn-primary btn-sm" onclick="updatePurchase('${p.id}','ordered')">تم الطلب</button>`:''}
        </td></tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('content').innerHTML = html;
  } catch(e) { document.getElementById('content').innerHTML = `<div class="alert alert-red">❌ ${e.message}</div>`; }
}

async function updatePurchase(id, status) {
  await api('maint_purchase_requests','PATCH',{ status },`?id=eq.${id}`);
  showToast(`تم التحديث إلى: ${purchaseStatusLabel[status]} ✓`); renderPurchases();
}

// ======================== MY PARTS (workshop: request + receive) ========================
async function renderMyParts() {
  try {
    const reqs = await api('maint_purchase_requests','GET',null,'?select=*,maint_orders(order_number,title)&order=created_at.desc');
    const ordered = reqs.filter(r=>r.status==='ordered');
    let html = '';
    if (ordered.length) html += `<div class="alert alert-green">📦 ${ordered.length} طلب جاهز للاستلام — اضغط "توريد" لتأكيد الاستلام</div>`;

    html += `<div class="table-wrap"><table>
      <thead><tr><th>رقم</th><th>الصنف</th><th>الكمية</th><th>مرتبط بأمر</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>`;
    if (!reqs.length) html += `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">لا توجد طلبات</td></tr>`;
    else reqs.forEach(p => {
      html += `<tr>
        <td><b>#${p.request_number}</b></td>
        <td>${p.item_name}</td>
        <td>${p.qty_requested}</td>
        <td class="td-muted">${p.maint_orders?'#'+p.maint_orders.order_number:'—'}</td>
        <td><span class="badge ${purchaseStatusBadge[p.status]}">${purchaseStatusLabel[p.status]}</span></td>
        <td>${p.status==='ordered'?`<button class="btn btn-success btn-sm" onclick="confirmReceive('${p.id}')">✓ استلمت</button>`:'—'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('content').innerHTML = html;
  } catch(e) { document.getElementById('content').innerHTML = `<div class="alert alert-red">❌ ${e.message}</div>`; }
}

async function confirmReceive(id) {
  if (!confirm('تأكيد استلام هذه القطعة؟')) return;
  await api('maint_purchase_requests','PATCH',{ status:'received', received_at:new Date().toISOString() },`?id=eq.${id}`);
  showToast('تم تأكيد الاستلام ✓'); renderMyParts();
}

async function openPurchaseReqModal() {
  editingId=null;
  ['item','supplier','notes'].forEach(f=>document.getElementById(`pr-${f}`).value='');
  document.getElementById('pr-qty').value=1;
  document.getElementById('pr-cost').value=0;
  const orders = await api('maint_orders','GET',null,'?select=id,order_number,title&status=neq.done&order=order_number.desc');
  document.getElementById('pr-order').innerHTML = `<option value="">— لا يوجد —</option>`+orders.map(o=>`<option value="${o.id}">#${o.order_number} - ${o.title}</option>`).join('');
  openModal('modal-purchase-req');
}

async function savePurchaseReq() {
  const body = { item_name:document.getElementById('pr-item').value.trim(), qty_requested:parseFloat(document.getElementById('pr-qty').value)||1, unit_cost_estimated:parseFloat(document.getElementById('pr-cost').value)||0, supplier:document.getElementById('pr-supplier').value.trim(), order_id:document.getElementById('pr-order').value||null, notes:document.getElementById('pr-notes').value.trim(), requested_by:'الورشة', status:'pending' };
  if (!body.item_name) return showToast('يرجى إدخال اسم الصنف','error');
  // إذا كان مرتبطاً بأمر عمل، غيّر حالته لـ waiting_parts
  try {
    await api('maint_purchase_requests','POST',body);
    if (body.order_id) await api('maint_orders','PATCH',{ status:'waiting_parts' },`?id=eq.${body.order_id}`);
    closeModal('modal-purchase-req'); showToast('تم إرسال طلب القطعة ✓'); renderMyParts();
  } catch(e) { showToast(e.message,'error'); }
}

// ======================== REPORTS (admin only) ========================
async function renderReports() {
  try {
    const [orders, assets] = await Promise.all([
      api('maint_orders','GET',null,'?select=asset_id,actual_cost,status,order_type,maint_assets(code)'),
      api('maint_assets','GET',null,'?select=id,code')
    ]);
    const done = orders.filter(o=>o.status==='done');
    const costByAsset = {};
    const countByAsset = {};
    done.forEach(o=>{ const k=o.maint_assets?.code||'غير معروف'; costByAsset[k]=(costByAsset[k]||0)+(o.actual_cost||0); countByAsset[k]=(countByAsset[k]||0)+1; });
    const sorted = Object.entries(costByAsset).sort((a,b)=>b[1]-a[1]);
    const maxCost = sorted[0]?.[1]||1;
    let html = `<div class="stat-grid">
      <div class="stat-card"><div class="stat-label">إجمالي التكاليف</div><div class="stat-value">${done.reduce((s,o)=>s+(o.actual_cost||0),0).toLocaleString('ar-SA',{maximumFractionDigits:0})}</div><div class="stat-sub">ريال سعودي</div></div>
      <div class="stat-card"><div class="stat-label">أوامر منتهية</div><div class="stat-value">${done.length}</div></div>
      <div class="stat-card"><div class="stat-label">صيانة تصحيحية</div><div class="stat-value">${orders.filter(o=>o.order_type==='corrective').length}</div></div>
      <div class="stat-card"><div class="stat-label">صيانة وقائية</div><div class="stat-value">${orders.filter(o=>o.order_type==='preventive').length}</div></div>
    </div><div class="table-wrap"><div class="table-header"><div class="table-title">التكلفة حسب الأصل</div></div><div style="padding:16px 18px">`;
    if (!sorted.length) html += `<div class="empty-state" style="padding:20px"><p>لا توجد بيانات بعد</p></div>`;
    else sorted.forEach(([code,cost])=>{
      const pct=Math.round((cost/maxCost)*100);
      html += `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:500">${code}</span><span style="font-size:13px;color:var(--text2)">${cost.toLocaleString('ar-SA',{maximumFractionDigits:0})} ر.س · ${countByAsset[code]} أمر</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div></div></div>`;
    });
    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
  } catch(e) { document.getElementById('content').innerHTML = `<div class="alert alert-red">❌ ${e.message}</div>`; }
}
</script>
</body>
</html>
